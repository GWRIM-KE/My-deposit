<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    text-align: center;

    /* 🎨 CUSTOM BACKGROUND IMAGE */
    background: url("https://images5.alphacoders.com/696/thumb-1920-696578.jpg") no-repeat center center fixed;
    background-size: cover;
  }

  /* Dark overlay for readability */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: -1;
  }

  h1 {
    position: absolute;
    top: 15%;
    width: 100%;
    font-size: 50px;
    color: #fff;
    opacity: 0;
    transition: opacity 1.2s ease;
    text-shadow: 0 0 15px rgba(255,255,255,0.8);
  }

  #cake {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  #cake:hover {
    transform: translate(-50%, -50%) scale(1.05);
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<h1 id="message">🎉 Happy Birthday AUNT JOSEPHINE! 🎂</h1>

<!-- 🎂 CAKE IMAGE -->
<img id="cake" src="https://thumbs.dreamstime.com/b/click-here-17321510.jpg?w=768" alt="Cake">

<!-- 🎵 MUSIC -->
<audio id="music" src="https://open.spotify.com/track/3K7Q9PHUWPTaknlbFPThn2?si=070daf49ce474bfd"></audio>

<canvas id="confetti"></canvas>

<script>
const cake = document.getElementById("cake");
const message = document.getElementById("message");
const music = document.getElementById("music");

const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let confetti = [];

function createConfettiBurst() {
  for (let i = 0; i < 200; i++) {
    confetti.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      size: Math.random() * 8 + 4,
      angle: Math.random() * Math.PI * 2,
      speed: Math.random() * 6 + 3,
      rotation: Math.random() * 360,
      rotationSpeed: Math.random() * 10 - 5,
      gravity: 0.15,
      drag: 0.99,
      color: `hsl(${Math.random()*360}, 100%, 60%)`,
      life: 150
    });
  }
}

function drawConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  confetti.forEach((p, i) => {
    p.x += Math.cos(p.angle) * p.speed;
    p.y += Math.sin(p.angle) * p.speed + p.gravity;
    p.speed *= p.drag;

    // wobble
    p.x += Math.sin(p.rotation * 0.1);

    p.rotation += p.rotationSpeed;
    p.life--;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);

    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;

    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
    ctx.restore();

    if (p.life <= 0) {
      confetti.splice(i, 1);
    }
  });

  requestAnimationFrame(drawConfetti);
}

let started = false;

cake.addEventListener("click", () => {
  message.style.opacity = 1;

  music.currentTime = 0;
  music.play();

  createConfettiBurst();

  if (!started) {
    drawConfetti();
    started = true;
  }
});
</script>

</body>
</html>
